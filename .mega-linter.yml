MEGALINTER_FLAVOR: go

DISABLE_LINTERS:
  - GO_GOLANGCI_LINT  # already runs in ci.yml

ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - COPYPASTE_JSCPD
  - DOCKERFILE_HADOLINT
  - JSON_PRETTIER
  - MARKDOWN_MARKDOWNLINT
  - YAML_YAMLLINT

FILTER_REGEX_EXCLUDE: (megalinter-reports|node_modules|\.next|vendor|apps/api/internal/store)

APPLY_FIXES: all
APPLY_FIXES_EVENT: pull_request
APPLY_FIXES_COMMIT_MSG: "style: auto-fix by MegaLinter"

GITHUB_STATUS_REPORTER: true
GITHUB_COMMENT_REPORTER: true
